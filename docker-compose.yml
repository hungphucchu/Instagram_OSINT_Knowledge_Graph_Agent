services:
  app:
    build: .
    image: instagram-osint-kg:local
    container_name: instagram_osint_kg_app
    env_file:
      - .env
    environment:
      # Inside the compose network the app reaches Neo4j by service name.
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-instagent123}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      QUERY_LLM_ENABLED: ${QUERY_LLM_ENABLED:-true}
    volumes:
      - ./reports:/home/app/reports
      - ./data:/home/app/data
      - ./apify_data:/home/app/apify_data
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    container_name: instagram_osint_kg_neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-instagent123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u $${NEO4J_USER:-neo4j} -p $${NEO4J_PASSWORD:-instagent123} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
