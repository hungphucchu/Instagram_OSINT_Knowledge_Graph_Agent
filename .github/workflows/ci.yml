# Phase 0: lint + unit tests on fixtures only (no live Instagram or LLM keys).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install
        run: |
          python -m venv .venv-ci
          .venv-ci/bin/python -m pip install -U pip
          .venv-ci/bin/python -m pip install -e ".[dev]"

      - name: Ruff
        run: .venv-ci/bin/ruff check src tests

      - name: Pytest
        run: .venv-ci/bin/python -m pytest tests/ -v
