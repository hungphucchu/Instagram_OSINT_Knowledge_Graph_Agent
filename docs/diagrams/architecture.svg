<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
    <style>
      .box { fill: #f7f8fa; stroke: #5b6b8a; stroke-width: 2; rx: 8; }
      .ingest { fill: #eef4ff; stroke: #2f6cff; }
      .query  { fill: #f0fff4; stroke: #2f9c47; }
      .store  { fill: #fff7e6; stroke: #cc7a00; }
      .label  { font-size: 14px; fill: #1c2330; }
      .title  { font-size: 16px; font-weight: 700; fill: #1c2330; }
      .header { font-size: 18px; font-weight: 700; fill: #2c3e50; }
      .arrow  { stroke: #444; stroke-width: 1.6; fill: none; }
      .group  { fill: none; stroke: #b6bdcc; stroke-dasharray: 4 4; rx: 12; }
    </style>
  </defs>

  <text x="40" y="32" class="header">Instagram OSINT Knowledge Graph Agent  system architecture</text>

  <!-- Ingest pipeline group -->
  <rect class="group" x="30" y="60" width="1040" height="200" />
  <text x="50" y="84" class="title">Ingest pipeline (LangGraph orchestrated, idempotent upserts)</text>

  <rect class="box ingest" x="50"  y="110" width="160" height="80"/>
  <text x="60"  y="138" class="title">1. Collection</text>
  <text x="60"  y="160" class="label">Apify / fixture</text>
  <text x="60"  y="178" class="label">’ RawArtifactStore</text>

  <rect class="box ingest" x="240" y="110" width="160" height="80"/>
  <text x="250" y="138" class="title">2. Extraction</text>
  <text x="250" y="160" class="label">LLM / heuristic</text>
  <text x="250" y="178" class="label">’ ExtractionStore</text>

  <rect class="box ingest" x="430" y="110" width="160" height="80"/>
  <text x="440" y="138" class="title">3. Deduplication</text>
  <text x="440" y="160" class="label">char-ngram + fuzzy</text>
  <text x="440" y="178" class="label">’ DedupStore</text>

  <rect class="box ingest" x="620" y="110" width="160" height="80"/>
  <text x="630" y="138" class="title">4. Graph insertion</text>
  <text x="630" y="160" class="label">idempotent MERGE</text>
  <text x="630" y="178" class="label">’ Neo4j</text>

  <rect class="box ingest" x="810" y="110" width="240" height="80"/>
  <text x="820" y="138" class="title">5. Quality (gate)</text>
  <text x="820" y="160" class="label">deterministic rules + LLM judge</text>
  <text x="820" y="178" class="label">’ QualityReport (reports/)</text>

  <line class="arrow" x1="210" y1="150" x2="240" y2="150" marker-end="url(#arrow)"/>
  <line class="arrow" x1="400" y1="150" x2="430" y2="150" marker-end="url(#arrow)"/>
  <line class="arrow" x1="590" y1="150" x2="620" y2="150" marker-end="url(#arrow)"/>
  <line class="arrow" x1="780" y1="150" x2="810" y2="150" marker-end="url(#arrow)"/>

  <!-- Query path group -->
  <rect class="group" x="30" y="290" width="1040" height="220" />
  <text x="50" y="314" class="title">Query path (Graph-RAG)</text>

  <rect class="box query" x="50"  y="340" width="180" height="80"/>
  <text x="60"  y="368" class="title">6. API (FastAPI)</text>
  <text x="60"  y="390" class="label">/api/query, /health</text>
  <text x="60"  y="408" class="label">request_id middleware</text>

  <rect class="box query" x="260" y="340" width="180" height="80"/>
  <text x="270" y="368" class="title">7. Router</text>
  <text x="270" y="390" class="label">NL ’ Cypher (LLM)</text>
  <text x="270" y="408" class="label">’ Cypher safety guard</text>

  <rect class="box query" x="470" y="340" width="180" height="80"/>
  <text x="480" y="368" class="title">8. Retriever</text>
  <text x="480" y="390" class="label">read-only Cypher</text>
  <text x="480" y="408" class="label">’ Neo4j rows</text>

  <rect class="box query" x="680" y="340" width="180" height="80"/>
  <text x="690" y="368" class="title">9. Generator</text>
  <text x="690" y="390" class="label">grounded LLM answer</text>
  <text x="690" y="408" class="label">+ contradiction guard</text>

  <rect class="box store" x="890" y="340" width="160" height="80"/>
  <text x="900" y="368" class="title">10. Browser UI</text>
  <text x="900" y="390" class="label">single-page form</text>
  <text x="900" y="408" class="label">+ stats / sample</text>

  <line class="arrow" x1="230" y1="380" x2="260" y2="380" marker-end="url(#arrow)"/>
  <line class="arrow" x1="440" y1="380" x2="470" y2="380" marker-end="url(#arrow)"/>
  <line class="arrow" x1="650" y1="380" x2="680" y2="380" marker-end="url(#arrow)"/>
  <line class="arrow" x1="860" y1="380" x2="890" y2="380" marker-end="url(#arrow)"/>

  <!-- Cross-link from Neo4j (ingest) to Retriever (query) -->
  <line class="arrow" x1="700" y1="190" x2="560" y2="340" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="500" y="290" class="label">graph rows are queried</text>

  <!-- Footer -->
  <text x="40" y="535" class="label">Reading order: numbered boxes 1’10. Ingest left-to-right, then Query left-to-right. Solid arrows = data flow; dashed = read-only access.</text>
</svg>
